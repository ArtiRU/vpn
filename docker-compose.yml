# ========================================
# Docker Compose для VPN Backend
# Включает: Backend API, PostgreSQL, 3X-UI Panel
# Запуск: docker compose up -d
# Остановка: docker compose down
# ========================================

version: '3.8'

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:14-alpine
    container_name: vpn_postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vpn}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    
    ports:
      - "${DB_PORT:-5432}:5432"
    
    networks:
      - vpn_network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # NestJS Backend Application
  # ========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn_backend
    restart: unless-stopped
    
    depends_on:
      postgres:
        condition: service_healthy
    
    environment:
      # Server
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-vpn}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_LOGGING: ${DB_LOGGING:-false}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_MONTHLY_PRICE_ID: ${STRIPE_MONTHLY_PRICE_ID}
      STRIPE_YEARLY_PRICE_ID: ${STRIPE_YEARLY_PRICE_ID}

      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Xray Panel Configuration (3X-UI)
      XRAY_PANEL_URL: ${XRAY_PANEL_URL:-http://3x-ui:2053}
      XRAY_PANEL_USERNAME: ${XRAY_PANEL_USERNAME:-admin}
      XRAY_PANEL_PASSWORD: ${XRAY_PANEL_PASSWORD}
    
    ports:
      - "${PORT:-3000}:3000"
    
    networks:
      - vpn_network
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 3X-UI Panel (Xray VLESS Reality)
  # ========================================
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: vpn_3x_ui
    restart: unless-stopped
    
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    
    volumes:
      - 3x_ui_data:/etc/x-ui
      - ./cert:/root/cert
    
    ports:
      # Web panel port
      - "2053:2053"
      # VLESS Reality port (customize as needed)
      - "443:443"
    
    networks:
      - vpn_network
    
    tty: true
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ========================================
# Networks
# ========================================
networks:
  vpn_network:
    driver: bridge
    name: vpn_network

# ========================================
# Volumes (persistent storage)
# ========================================
volumes:
  postgres_data:
    name: vpn_postgres_data
    driver: local
  3x_ui_data:
    name: vpn_3x_ui_data
    driver: local
